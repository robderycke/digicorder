<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digicorder Pro - Selectie</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="scss/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/script.js"></script>
</head>
<body class="c-app">

    <header class="c-header py-5">
        <div class="container text-center">
            <h1 class="c-header__title display-4 fw-bold">Mijn <span class="u-text-primary">Digicorder</span></h1>
            <p class="lead text-muted">Stel je persoonlijke top 3 zenders samen</p>
        </div>
    </header>

    <main class="container">
        <section class="row g-3 mb-5">
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="VRT 1">
                    <div class="c-zender__media mb-3">
                        <img src="img/een.png" alt="VRT 1" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">VRT 1</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="VRT Canvas">
                    <div class="c-zender__media mb-3">
                        <img src="img/canvas.jpeg" alt="VRT Canvas" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">VRT Canvas</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="VTM">
                    <div class="c-zender__media mb-3">
                        <img src="img/vtm.jpeg" alt="VTM" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">VTM</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="VTM 2">
                    <div class="c-zender__media mb-3">
                        <img src="img/vtm2.jpeg" alt="VTM 2" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">VTM 2</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="VTM 3">
                    <div class="c-zender__media mb-3">
                        <img src="img/vtm3.jpeg" alt="VTM 3" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">VTM 3</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="VTM 4">
                    <div class="c-zender__media mb-3">
                        <img src="img/vtm4.jpeg" alt="VTM 4" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">VTM 4</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="Play 4">
                    <div class="c-zender__media mb-3">
                        <img src="img/play4.png" alt="Play 4" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">Play 4</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="Kanaal Z">
                    <div class="c-zender__media mb-3">
                        <img src="img/kanaalz.jpeg" alt="Kanaal Z" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">Kanaal Z</span>
                </label>
            </div>
            <div class="col-6 col-md-4 col-lg-3">
                <label class="c-zender h-100 p-4 border rounded-4 d-flex flex-column align-items-center text-center">
                    <input type="checkbox" class="c-zender__checkbox js-zender-check" value="Ketnet">
                    <div class="c-zender__media mb-3">
                        <img src="img/ketnet_2021.svg" alt="Ketnet" class="c-zender__img">
                    </div>
                    <span class="c-zender__name fw-bold">Ketnet</span>
                </label>
            </div>
        </section>

        <section class="c-selection p-4 bg-white shadow-lg rounded-4 border">
            <div class="row align-items-center">
                <div class="col-md-6 mb-3 mb-md-0">
                    <h3 class="h5 mb-1">Jouw Favorieten</h3>
                    <p class="small text-muted mb-2"><span class="js-aantal-gekozen fw-bold u-text-primary">0</span> / 3 gekozen</p>
                    <div class="js-mijn-favorietjes d-flex flex-wrap gap-2"></div>
                </div>
                <div class="col-md-6 text-md-end">
                    <button class="c-button js-btn-save" disabled>
                        Selectie Opslaan
                    </button>
                </div>
            </div>
        </section>
    </main>

    <div class="modal fade js-modal" id="saveModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg rounded-4">
                <div class="modal-body text-center p-5">
                    <h4 class="fw-bold mb-3 u-text-primary">Bevestiging</h4>
                    <div class="js-modal-body text-muted mb-4"></div>
                    <button type="button" class="c-button c-button--small" data-bs-dismiss="modal">Sluiten</button>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
